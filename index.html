<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Kesehatan Sederhana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 900px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .btn-update { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">🩺 Catatan Kesehatan Pasien</h2>

    <div class="row mb-4">
        <div class="col-md-4">
            <input type="text" id="nama" class="form-control" placeholder="Nama Pasien">
        </div>
        <div class="col-md-3">
            <input type="number" id="usia" class="form-control" placeholder="Usia">
        </div>
        <div class="col-md-3">
            <input type="text" id="keluhan" class="form-control" placeholder="Keluhan Utama">
        </div>
        <div class="col-md-2">
            <button onclick="tambahData()" id="btnSimpan" class="btn btn-primary w-100">Simpan</button>
            <button onclick="updateData()" id="btnUpdate" class="btn btn-warning w-100 btn-update">Update</button>
        </div>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Nama</th>
                <th>Usia</th>
                <th>Keluhan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelBody">
            </tbody>
    </table>
</div>

<script>
    let dataKesehatan = [];
    let editIndex = null;

    const tabelBody = document.getElementById('tabelBody');
    const inputNama = document.getElementById('nama');
    const inputUsia = document.getElementById('usia');
    const inputKeluhan = document.getElementById('keluhan');
    const btnSimpan = document.getElementById('btnSimpan');
    const btnUpdate = document.getElementById('btnUpdate');

    // Fungsi Render Tabel
    function tampilkanData() {
        tabelBody.innerHTML = '';
        dataKesehatan.forEach((item, index) => {
            tabelBody.innerHTML += `
                <tr>
                    <td>${item.nama}</td>
                    <td>${item.usia} Thn</td>
                    <td>${item.keluhan}</td>
                    <td>
                        <button class="btn btn-sm btn-info text-white" onclick="persiapanEdit(${index})">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="hapusData(${index})">Hapus</button>
                    </td>
                </tr>
            `;
        });
    }

    // CREATE
    function tambahData() {
        if(inputNama.value && inputUsia.value && inputKeluhan.value) {
            dataKesehatan.push({
                nama: inputNama.value,
                usia: inputUsia.value,
                keluhan: inputKeluhan.value
            });
            resetForm();
            tampilkanData();
        } else {
            alert("Harap isi semua kolom!");
        }
    }

    // DELETE
    function hapusData(index) {
        if(confirm("Hapus data ini?")) {
            dataKesehatan.splice(index, 1);
            tampilkanData();
        }
    }

    // UPDATE (Step 1: Pindahkan ke form)
    function persiapanEdit(index) {
        editIndex = index;
        inputNama.value = dataKesehatan[index].nama;
        inputUsia.value = dataKesehatan[index].usia;
        inputKeluhan.value = dataKesehatan[index].keluhan;

        btnSimpan.classList.add('btn-update');
        btnUpdate.classList.remove('btn-update');
    }

    // UPDATE (Step 2: Simpan perubahan)
    function updateData() {
        dataKesehatan[editIndex] = {
            nama: inputNama.value,
            usia: inputUsia.value,
            keluhan: inputKeluhan.value
        };
        resetForm();
        tampilkanData();
        
        btnSimpan.classList.remove('btn-update');
        btnUpdate.classList.add('btn-update');
    }

    function resetForm() {
        inputNama.value = '';
        inputUsia.value = '';
        inputKeluhan.value = '';
        editIndex = null;
    }
</script>

</body>
</html>
